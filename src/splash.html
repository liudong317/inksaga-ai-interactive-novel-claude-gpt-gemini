<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkSaga 墨叙</title>
  <link rel="icon" type="image/png" href="assets/icons/icon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }
    .logo-img {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      margin-bottom: 16px;
    }
    .logo {
      font-size: 32px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .progress-container {
      width: 300px;
      height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #fff 0%, #f0f0f0 100%);
      border-radius: 3px;
      animation: loading 1.5s ease-in-out infinite;
    }
    @keyframes loading {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }
    .loading-text {
      color: #fff;
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="assets/icons/icon.png" alt="InkSaga" class="logo-img">
    <div class="logo">InkSaga 墨叙</div>
  </div>
  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>
  <div class="loading-text">正在加载应用...</div>
</body>
</html>
